<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATO - Advanced Tab Organizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <img class="header-icon" src="../assets/icons/ato-logo.svg" alt="ATO Logo">
      <div class="header-text">
        <h1 class="title">ATO</h1>
        <p class="subtitle">Advanced Tab Organizer</p>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Tabs</span>
        <span class="stat-value" id="total-tabs">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Duplicates</span>
        <span class="stat-value" id="duplicate-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Domains</span>
        <span class="stat-value" id="domain-count">0</span>
      </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
      <!-- Action Buttons -->
      <div class="action-row">
        <button class="btn-action btn-undo hidden" id="undo-duplicates-btn" title="Undo - restore closed tabs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          <span>Undo</span>
        </button>
      </div>
    </div>

    <!-- Duplicate List -->
    <div class="duplicates-container">
      <button class="section-header" id="duplicates-header" aria-expanded="true">
        <svg class="fold-arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
          <path d="M4 2l4 4-4 4V2z"/>
        </svg>
        <h2 class="section-title">Duplicate Tabs</h2>
        <span class="section-count" id="duplicates-section-count">0</span>
      </button>
      <div class="section-content" id="duplicates-content">
        <!-- Duplicates Action Bar -->
        <div class="duplicates-action-bar">
          <button class="btn-action btn-danger" id="close-all-btn" title="Close all duplicate tabs">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
            <span>Close duplicates</span>
          </button>
          <div class="btn-group" id="duplicates-sort-buttons">
            <button class="btn-toggle active" data-sort="default" title="Default order">Default</button>
            <button class="btn-toggle" data-sort="title" title="Sort by title A-Z">Title</button>
            <button class="btn-toggle" data-sort="domain" title="Group by domain">Site</button>
          </div>
        </div>
        <div id="duplicate-list" class="duplicate-list">
          <!-- Will be populated by JavaScript -->
        </div>
        <div id="empty-state" class="empty-state" style="display: none;">
          <p>No duplicate tabs</p>
        </div>
      </div>
    </div>

    <!-- All Tabs List -->
    <div class="all-tabs-container">
      <button class="section-header" id="all-tabs-header" aria-expanded="true">
        <svg class="fold-arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
          <path d="M4 2l4 4-4 4V2z"/>
        </svg>
        <h2 class="section-title">All Tabs</h2>
        <span class="section-count" id="all-tabs-section-count">0</span>
      </button>
      <div class="section-content" id="all-tabs-content">
        <!-- Domain Filter (searchable) -->
        <div class="domain-filter">
          <div class="domain-filter-input-wrapper">
            <input type="text" id="domain-filter-input" class="domain-filter-input"
                   placeholder="Filter by domain..." autocomplete="off">
            <button type="button" id="domain-filter-clear" class="domain-filter-clear hidden">×</button>
          </div>
          <div id="domain-filter-dropdown" class="domain-filter-dropdown hidden">
            <!-- Options populated by JS -->
          </div>
        </div>
        <!-- Sort Buttons -->
        <div class="sort-bar">
          <span class="action-label">Sort:</span>
          <div class="btn-group" id="sort-buttons">
            <button class="btn-toggle active" data-sort="default" title="Default order">Default</button>
            <button class="btn-toggle" data-sort="title" title="Sort by title A-Z">Title</button>
            <button class="btn-toggle" data-sort="domain" title="Group by domain">Site</button>
            <button class="btn-toggle" data-sort="age" title="Toggle oldest/newest first">Old/New</button>
            <button class="btn-toggle" data-sort="duplicates" title="Most duplicates first">Dupes</button>
          </div>
        </div>
        <div id="all-tabs-list" class="all-tabs-list">
          <!-- Will be populated by JavaScript -->
        </div>
      </div>
    </div>

    <!-- Domain Sections (for domains with 3+ tabs) -->
    <div id="domain-sections-container" class="domain-sections-container">
      <!-- Will be populated by JavaScript -->
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
