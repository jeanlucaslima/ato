<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATO - Advanced Tab Organizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <svg class="header-icon" viewBox="-11 -11 122 122" fill="#ece8ed">
        <path d="M86.99872,29.9895c-.00012-.01105-.0036-.02167-.00409-.03277a.99019.99019,0,0,0-.07178-.32221c-.00525-.01337-.00317-.0274-.009-.04065-.0036-.00812-.011-.01282-.01477-.02075a.9917.9917,0,0,0-.19812-.27911c-.018-.01789-.037-.03217-.05628-.04853a.98559.98559,0,0,0-.09-.07757l-36-24a.99857.99857,0,0,0-1.10938,0l-36,24a.98559.98559,0,0,0-.09.07757c-.01923.01636-.03827.03064-.05628.04853a.9917.9917,0,0,0-.19812.27911c-.00378.00793-.01117.01263-.01477.02075-.00586.01325-.00378.02728-.009.04065a.98747.98747,0,0,0-.07178.32239c-.00049.011-.004.02167-.00409.03265L13,30V70l.00073.0061c.00012.01465.0047.029.00543.04364a.99889.99889,0,0,0,.02832.20569c.00672.02533.01978.04859.02845.07343a1.00245,1.00245,0,0,0,.06683.15918l.007.01678c.01392.02381.0343.04187.05.06421a.98612.98612,0,0,0,.09454.12152,1.00707,1.00707,0,0,0,.08124.07007.97232.97232,0,0,0,.08276.07141l36,24a.9775.9775,0,0,0,.109.05127.95424.95424,0,0,0,.09924.04669.98514.98514,0,0,0,.693,0,.95424.95424,0,0,0,.09924-.04669.9775.9775,0,0,0,.109-.05127l36-24a463.02063,463.02063,0,0,1,.16607-.14325.994.994,0,0,0,.092-.119c.01624-.02313.037-.04187.05146-.06659l.00671-.01611a.99256.99256,0,0,0,.06415-.15308c.01-.02771.02447-.054.03186-.08227a1.00828,1.00828,0,0,0,.0202-.148.98466.98466,0,0,0,.01276-.103L87,70V30Zm-3.06525-.16534L68.30084,36.772l-3.47748-6.23736A.97217.97217,0,0,0,65,30a1,1,0,0,0-1-1h-.03217L52.88849,9.1275Zm-33.7771-21.49,11.5542,20.72424A.988.988,0,0,0,61,30a1,1,0,0,0,1,1h.793l3.34515,6H33.72583l3.439-6H38a1,1,0,0,0,1-1,.98727.98727,0,0,0-.721-.94373Zm-2.58374.4859L36.00592,29H36a1,1,0,0,0-1,1,.97236.97236,0,0,0,.14941.49432l-3.56817,6.22522L16.06653,29.82416ZM15,31.53876l15.58966,6.92877-5.454,9.696a.99806.99806,0,0,0-.63824.10352,1.01187,1.01187,0,0,0-.38788,1.38049l.09582.1698L15,66.18243Zm10.41705,20.204a1.01014,1.01014,0,0,0,1.46283-1.32208l-.36017-.63819L32,40.03973l5.54987,9.8664-.13062.225a.9766.9766,0,0,0,.39685,1.35462,1.04677,1.04677,0,0,0,.67731.09784l5.61523,9.9826A.97983.97983,0,0,0,44,62a.9906.9906,0,0,0,.9043.98065L48.29016,69H15.70984ZM49,92.13141,17.30286,71H49Zm1-24.17114-2.81152-4.99836A.986.986,0,0,0,48,62a1,1,0,0,0-1-1h-.91516L39.87976,49.96863l.41345-.7124a.97673.97673,0,0,0-.39691-1.35462,1.06368,1.06368,0,0,0-1.13385.08069L33.7099,39H66.29016l-5.05261,8.98242a1.06,1.06,0,0,0-1.13324-.08026.97769.97769,0,0,0-.39453,1.355l.4118.70923L53.91516,61H53a1,1,0,0,0-1,1,.98611.98611,0,0,0,.81158.962Zm1,24.17114V71H82.69714ZM51.70984,69l3.38586-6.01935A.99065.99065,0,0,0,56,62a.98.98,0,0,0-.10864-.43384l5.61523-9.9826a1.04291,1.04291,0,0,0,.678-.09839.97774.97774,0,0,0,.39459-1.355l-.12957-.22315,5.47308-9.72992,5.50494,9.69867-.30755.54493A1.00341,1.00341,0,0,0,74.50854,51.78L84.28253,69ZM85,66.21234,75.74463,49.90619l.14593-.25861A1.00958,1.00958,0,0,0,74.76031,48.172l-5.47637-9.64832L85,31.53876Z"/>
      </svg>
      <div class="header-text">
        <h1 class="title">ATO</h1>
        <p class="subtitle">Advanced Tab Organizer</p>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Tabs</span>
        <span class="stat-value" id="total-tabs">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Duplicates</span>
        <span class="stat-value" id="duplicate-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Domains</span>
        <span class="stat-value" id="domain-count">0</span>
      </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
      <!-- Domain Filter -->
      <div class="action-row">
        <select id="domain-select" class="domain-select">
          <option value="">All Domains</option>
        </select>
      </div>

      <!-- Sort Buttons -->
      <div class="action-row">
        <span class="action-label">Sort:</span>
        <div class="btn-group" id="sort-buttons">
          <button class="btn-toggle active" data-sort="default" title="Default order">—</button>
          <button class="btn-toggle" data-sort="title" title="Title A-Z">A-Z</button>
          <button class="btn-toggle" data-sort="title-desc" title="Title Z-A">Z-A</button>
          <button class="btn-toggle" data-sort="domain" title="By domain">Dom</button>
          <button class="btn-toggle" data-sort="age" title="By last accessed">Age</button>
          <button class="btn-toggle" data-sort="duplicates" title="Most duplicates">Dupe</button>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-row">
        <button class="btn-action btn-danger" id="close-all-btn" title="Close all duplicate tabs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          <span>Close duplicates</span>
        </button>
        <button class="btn-action btn-danger" id="close-domain-btn" title="Choose a domain to close all tabs from it" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          <span>Close all from domain</span>
        </button>
      </div>
    </div>

    <!-- Duplicate List -->
    <div class="duplicates-container">
      <button class="section-header" id="duplicates-header" aria-expanded="true">
        <svg class="fold-arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
          <path d="M4 2l4 4-4 4V2z"/>
        </svg>
        <h2 class="section-title">Duplicate Tabs</h2>
        <span class="section-count" id="duplicates-section-count">0</span>
      </button>
      <div class="section-content" id="duplicates-content">
        <div id="duplicate-list" class="duplicate-list">
          <!-- Will be populated by JavaScript -->
        </div>
        <div id="empty-state" class="empty-state" style="display: none;">
          <p>No duplicate tabs</p>
        </div>
      </div>
    </div>

    <!-- All Tabs List -->
    <div class="all-tabs-container">
      <button class="section-header" id="all-tabs-header" aria-expanded="true">
        <svg class="fold-arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
          <path d="M4 2l4 4-4 4V2z"/>
        </svg>
        <h2 class="section-title">All Tabs</h2>
        <span class="section-count" id="all-tabs-section-count">0</span>
      </button>
      <div class="section-content" id="all-tabs-content">
        <div id="all-tabs-list" class="all-tabs-list">
          <!-- Will be populated by JavaScript -->
        </div>
      </div>
    </div>

    <!-- Domain Sections (for domains with 3+ tabs) -->
    <div id="domain-sections-container" class="domain-sections-container">
      <!-- Will be populated by JavaScript -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
