<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATO - Advanced Tab Organizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <img class="header-icon" src="../assets/icons/ato-logo.svg" alt="ATO Logo">
      <div class="header-text">
        <h1 class="title">ATO</h1>
        <p class="subtitle">Advanced Tab Organizer</p>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Tabs</span>
        <span class="stat-value" id="total-tabs">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Duplicates</span>
        <span class="stat-value" id="duplicate-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Domains</span>
        <span class="stat-value" id="domain-count">0</span>
      </div>
    </div>

    <!-- Global Search -->
    <div class="search-container">
      <div class="search-input-wrapper">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <span id="search-mode-chip" class="search-mode-chip hidden">
          <span id="search-mode-chip-label"></span>
          <button type="button" id="search-mode-chip-remove" class="search-mode-chip-remove" aria-label="Exit search mode" title="Exit mode">×</button>
        </span>
        <input type="text" id="global-search-input" class="global-search-input"
               placeholder='Search tabs... ("word" exact, word* wildcard)' autocomplete="off" autofocus>
        <button type="button" id="search-mode-btn" class="search-mode-btn" aria-label="Search in field" title="Search in a specific field" aria-haspopup="true">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>
        <button type="button" id="global-search-clear" class="global-search-clear hidden">×</button>
        <div id="search-mode-menu" class="search-mode-menu hidden" role="menu">
          <button type="button" class="search-mode-option" data-field="all" role="menuitem">
            <svg class="search-mode-option-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"/>
              <polyline points="2 17 12 22 22 17"/>
              <polyline points="2 12 12 17 22 12"/>
            </svg>
            <span>All fields</span>
          </button>
          <button type="button" class="search-mode-option" data-field="url" role="menuitem">
            <svg class="search-mode-option-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <span>In URL</span>
          </button>
          <button type="button" class="search-mode-option" data-field="title" role="menuitem">
            <svg class="search-mode-option-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 7 4 4 20 4 20 7"/>
              <line x1="9" y1="20" x2="15" y2="20"/>
              <line x1="12" y1="4" x2="12" y2="20"/>
            </svg>
            <span>In title</span>
          </button>
        </div>
      </div>
      <div id="search-results-count" class="search-results-count hidden"></div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
      <!-- Action Buttons -->
      <div class="action-row">
        <button class="btn-action btn-undo" id="undo-duplicates-btn" title="Undo - restore closed tabs" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          <span>Undo</span>
        </button>
        <button class="btn-action btn-scope hidden" id="scope-btn" title="Toggle detection scope">
          <svg id="scope-icon-all" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9" rx="1"/>
            <rect x="14" y="3" width="7" height="9" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <svg id="scope-icon-current" class="hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
          </svg>
          <span id="scope-label">All</span>
        </button>
        <button class="btn-action btn-options" id="options-btn" title="Open settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Search Results (shown only when searching) -->
    <div class="search-results-container hidden" id="search-results-container">
      <div class="search-results-header">
        <h2 class="section-title">Search Results</h2>
        <span class="section-count" id="search-results-section-count">0</span>
        <button class="btn-action btn-danger" id="close-search-results-btn" title="Close all tabs in search results">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          <span>Close results</span>
        </button>
      </div>
      <div id="search-results-list" class="search-results-list">
        <!-- Populated by JS -->
      </div>
      <div id="search-empty-state" class="empty-state hidden">
        <p>No tabs match your search</p>
      </div>
    </div>

    <!-- Playing Media List (tabs producing sound) -->
    <div class="media-container hidden" id="media-container">
      <button class="section-header" id="media-header" aria-expanded="true">
        <svg class="fold-arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
          <path d="M4 2l4 4-4 4V2z"/>
        </svg>
        <h2 class="section-title">Playing Media</h2>
        <span class="section-count" id="media-section-count">0</span>
      </button>
      <div class="section-content" id="media-content">
        <div class="section-content-inner">
          <div id="media-list" class="media-list">
            <!-- Will be populated by JavaScript -->
          </div>
        </div>
      </div>
    </div>

    <!-- Duplicate List -->
    <div class="duplicates-container">
      <button class="section-header" id="duplicates-header" aria-expanded="true">
        <svg class="fold-arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
          <path d="M4 2l4 4-4 4V2z"/>
        </svg>
        <h2 class="section-title">Duplicated Tabs</h2>
        <span class="section-count" id="duplicates-section-count">0</span>
      </button>
      <div class="section-content" id="duplicates-content">
        <div class="section-content-inner">
          <!-- Duplicates Action Bar -->
          <div class="duplicates-action-bar">
            <button class="btn-action btn-danger" id="close-all-btn" title="Close all duplicate tabs">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              </svg>
              <span>Close duplicates</span>
            </button>
            <div class="btn-group" id="duplicates-sort-buttons">
              <button class="btn-toggle active" data-sort="default" title="Default order">Default</button>
              <button class="btn-toggle" data-sort="title" title="Sort by title A-Z">Title</button>
              <button class="btn-toggle" data-sort="domain" title="Group by domain">Site</button>
            </div>
          </div>
          <div id="duplicate-list" class="duplicate-list">
            <!-- Will be populated by JavaScript -->
          </div>
          <div id="empty-state" class="empty-state" style="display: none;">
            <p>No duplicate tabs</p>
          </div>
          <div id="pinned-warning" class="pinned-warning hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 9v4M12 17h.01M12 3l9 18H3z"/>
            </svg>
            <span><strong id="pinned-skip-count">0</strong> tab(s) protected</span>
          </div>
          <div id="browser-warning" class="pinned-warning hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span><strong id="browser-skip-count">0</strong> browser tab(s) can't be closed by extensions</span>
          </div>
        </div>
      </div>
    </div>

    <!-- All Tabs List -->
    <div class="all-tabs-container">
      <button class="section-header" id="all-tabs-header" aria-expanded="true">
        <svg class="fold-arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
          <path d="M4 2l4 4-4 4V2z"/>
        </svg>
        <h2 class="section-title">All Tabs</h2>
        <span class="section-count" id="all-tabs-section-count">0</span>
      </button>
      <div class="section-content" id="all-tabs-content">
        <div class="section-content-inner">
          <!-- Domain Filter (searchable) -->
          <div class="domain-filter">
            <div class="domain-filter-input-wrapper">
              <input type="text" id="domain-filter-input" class="domain-filter-input"
                     placeholder="Filter by domain..." autocomplete="off">
              <button type="button" id="domain-filter-clear" class="domain-filter-clear hidden">×</button>
            </div>
            <div id="domain-filter-dropdown" class="domain-filter-dropdown hidden">
              <!-- Options populated by JS -->
            </div>
          </div>
          <!-- Sort Buttons -->
          <div class="sort-bar">
            <span class="action-label">Sort:</span>
            <div class="btn-group" id="sort-buttons">
              <button class="btn-toggle active" data-sort="default" title="Default order">Default</button>
              <button class="btn-toggle" data-sort="title" title="Sort by title A-Z">Title</button>
              <button class="btn-toggle" data-sort="domain" title="Group by domain">Site</button>
              <button class="btn-toggle" data-sort="age" title="Toggle oldest/newest first">Old/New</button>
              <button class="btn-toggle" data-sort="duplicates" title="Most duplicates first">Dupes</button>
            </div>
          </div>
          <div id="all-tabs-list" class="all-tabs-list">
            <!-- Will be populated by JavaScript -->
          </div>
        </div>
      </div>
    </div>

    <!-- Domain Sections Sort Bar -->
    <div class="domain-sections-sort-bar sort-bar hidden" id="domain-sort-bar">
      <span class="action-label">Sort groups:</span>
      <div class="btn-group" id="domain-sort-buttons">
        <button class="btn-toggle active" data-sort="name" title="Toggle A-Z / Z-A">A-Z</button>
        <button class="btn-toggle" data-sort="count" title="Toggle most / fewest tabs">Most</button>
        <button class="btn-toggle" data-sort="recent" title="Most recently accessed first">Recent</button>
      </div>
    </div>

    <!-- Domain Sections (for domains with 3+ tabs) -->
    <div id="domain-sections-container" class="domain-sections-container">
      <!-- Will be populated by JavaScript -->
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span id="footer-version">v1.5.0</span>
      <span class="footer-separator">·</span>
      <a href="https://github.com/jeanlucaslima/ato" target="_blank" rel="noopener">GitHub</a>
      <span class="footer-separator">·</span>
      <span id="footer-shortcut">try ⌘+U</span>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
